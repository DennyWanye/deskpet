[project]
name = "deskpet-backend"
version = "0.1.0"
description = "Desktop Pet AI Backend"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "websockets>=13.0",
    "tomli>=2.0",
    "structlog>=24.0",
    "httpx>=0.27.0",
    "ollama>=0.4.0",
    "aiosqlite>=0.22.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
]

[tool.setuptools]
py-modules = ["config", "main"]
packages = ["providers", "memory", "memory.migrations", "tests", "agent", "pipeline", "tools", "observability"]

[tool.setuptools.package-data]
"memory.migrations" = ["*.sql"]
