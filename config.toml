schema_version = 1

[backend]
host = "127.0.0.1"
port = 8100
log_level = "INFO"

[llm]
strategy = "cloud_first"
daily_budget_cny = 10.0

[llm.local]
model = "gemma4:e4b"
base_url = "http://localhost:11434/v1"
api_key = "ollama"
temperature = 0.7
max_tokens = 2048

# Cloud provider. api_key is NOT stored in this file — backend loads it
# from the DESKPET_CLOUD_API_KEY env var at boot. Leaving the section
# enabled means cloud_first can route; comment it out to run local-only.
[llm.cloud]
model = "qwen3.6-plus"
base_url = "https://vcrppsmofoyv.cloud.sealos.io/v1"
temperature = 0.7
max_tokens = 2048

[billing]
# Daily spend cap (CNY). HybridRouter refuses cloud calls once exceeded;
# local calls stay free and unaffected.
daily_budget_cny = 10.0
# Fallback price for models not in [billing.pricing] (CNY per 1M tokens,
# prompt+completion combined). Intentionally pessimistic so unknown models
# don't silently burn budget.
unknown_model_price_cny_per_m_tokens = 20.0
# IANA timezone name used for daily rollover. Defaults to Asia/Shanghai
# (product targets Chinese users — UTC rollover would reset the budget
# at 08:00 Beijing, right in the active-user window). Override if you're
# running the pet outside China, e.g. tz = "America/Los_Angeles".
tz = "Asia/Shanghai"

[billing.pricing]
# Per-1M-token price (CNY). Cover the models listed in [llm.cloud]; unknown
# models fall back to `unknown_model_price_cny_per_m_tokens` above.
"qwen3.6-plus" = 8.0
"deepseek-chat" = 1.0

[asr]
provider = "faster-whisper"
model = "large-v3-turbo"
device = "cuda"
compute_type = "float16"

[tts]
provider = "edge-tts"
voice = "zh-CN-XiaoyiNeural"
model_dir = "./assets/cosyvoice2"  # kept for future CosyVoice 2 upgrade

[vad]
threshold = 0.5
min_speech_ms = 250
# P2-2 hot-fix (2026-04-20): 回归到 500ms —— Whisper 侧删 initial_prompt
# + no_speech_threshold=0.4 之后，短片段不再会幻觉成"谢谢大家"，可以
# 换更低的句末感知延迟（800ms 等近 1 秒才反应，太拖）。
min_silence_ms = 500

[memory]
db_path = "./data/memory.db"
embedding_model = "bge-m3"
