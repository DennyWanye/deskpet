schema_version = 1

[backend]
host = "127.0.0.1"
port = 8100
log_level = "INFO"

[llm]
strategy = "cloud_first"
daily_budget_cny = 10.0

[llm.local]
model = "gemma4:e4b"
base_url = "http://localhost:11434/v1"
api_key = "ollama"
temperature = 0.7
max_tokens = 2048

# Cloud provider. api_key is NOT stored in this file — backend loads it
# from the DESKPET_CLOUD_API_KEY env var at boot. Leaving the section
# enabled means cloud_first can route; comment it out to run local-only.
[llm.cloud]
model = "qwen3.6-plus"
base_url = "https://vcrppsmofoyv.cloud.sealos.io/v1"
temperature = 0.7
max_tokens = 2048

[billing]
# Daily spend cap (CNY). HybridRouter refuses cloud calls once exceeded;
# local calls stay free and unaffected.
daily_budget_cny = 10.0
# Fallback price for models not in [billing.pricing] (CNY per 1M tokens,
# prompt+completion combined). Intentionally pessimistic so unknown models
# don't silently burn budget.
unknown_model_price_cny_per_m_tokens = 20.0
# IANA timezone name used for daily rollover. Defaults to Asia/Shanghai
# (product targets Chinese users — UTC rollover would reset the budget
# at 08:00 Beijing, right in the active-user window). Override if you're
# running the pet outside China, e.g. tz = "America/Los_Angeles".
tz = "Asia/Shanghai"

[billing.pricing]
# Per-1M-token price (CNY). Cover the models listed in [llm.cloud]; unknown
# models fall back to `unknown_model_price_cny_per_m_tokens` above.
"qwen3.6-plus" = 8.0
"deepseek-chat" = 1.0

[asr]
provider = "faster-whisper"
model = "large-v3-turbo"
# P3-S1: subfolder under paths.model_root() containing the bundled
# faster-whisper checkpoints. In dev mode resolves to backend/models/<this>;
# under PyInstaller it resolves to <_MEIPASS>/models/<this>.
model_dir = "faster-whisper-large-v3-turbo"
device = "cuda"
compute_type = "float16"
# P2-2-F1: 热词偏置 —— 对这些常用短语的 logit 加权，减轻短音频
# (< 3s) 上的拼音近似幻觉（典型：讲个笑话 → 一个消化）。
# 空列表 = 不加偏置（与旧行为一致）。配合 transcribe() 里的
# 300ms 静音 pad 使用。
hotwords = [
    # 2026-04-22 修订：hotwords 必须是"短消歧词"（生僻字/专名/高混淆短词），
    # 不能塞整句。之前把"请给我讲一个笑话"整句塞进来，导致 Whisper 在弱/短
    # 音频上直接把 hotwords 当 transcript 吐出来（decoder 的 prefix bias
    # 在 no-speech 边界会回退到 prompt tokens 本身）。
    # 规则：每条 ≤4 字、只含真正易混淆的字词。
    "笑话",
    "散文",
    "故事",
    "你好",
    "谢谢",
    "再见",
]

[tts]
provider = "edge-tts"
voice = "zh-CN-XiaoyiNeural"
model_dir = "cosyvoice2"  # P3-S1: subfolder under paths.model_root() (backend/models/ in dev, sys._MEIPASS/models/ frozen)

[vad]
threshold = 0.5
min_speech_ms = 250
# P2-2 hot-fix (2026-04-20): 回归到 500ms —— Whisper 侧删 initial_prompt
# + no_speech_threshold=0.4 之后，短片段不再会幻觉成"谢谢大家"，可以
# 换更低的句末感知延迟（800ms 等近 1 秒才反应，太拖）。
min_silence_ms = 500

[voice]
# P2-2-M3: TTS-phase barge-in overrides. Normal VAD threshold / min_speech_ms
# live in [vad] above — these apply only while TTS is actively playing, so
# speaker echo is less likely to retrigger speech_start.
vad_threshold_during_tts = 0.65
min_speech_ms_during_tts = 400
# After TTS ends, ignore speech_start for this many ms — covers the tail
# of the audio being played out the speakers.
tts_cooldown_ms = 300

[memory]
# P3-S7: leave db_path empty to use the OS-standard user data directory
# (%AppData%\deskpet\data\memory.db on Windows). Set an absolute path
# here to override; relative paths are anchored under %AppData%\deskpet\.
db_path = ""
embedding_model = "bge-m3"

# P4-S4: L1 file memory — %APPDATA%\deskpet\data\MEMORY.md (pet-side
# observations) and USER.md (user profile). Entries are separated by
# `\n§\n`. When a file exceeds its size cap, lowest-salience entries are
# evicted until back under the cap.
[memory.l1]
memory_md_max_kb = 50
user_md_max_kb = 20
separator = "\n§\n"

# P4-S1: L2 session DB (SQLite + FTS5). WAL mode lets the backend and
# optional worker process read/write concurrently; application-level
# retry handles SQLITE_BUSY (exponential jitter, up to `retry_max` tries).
[memory.l2]
wal_enabled = true
fts5_enabled = true
retry_max = 5

# P4-S2: L3 vector memory (sqlite-vec + BGE-M3). 1024-dim cosine, async
# worker flushes embeddings every `flush_interval_s` OR every `batch_size`
# rows (whichever first). `decay_lambda` governs daily salience decay
# (exp(-lambda * days_since_touch)); `salience_boost_on_recall` nudges hits
# so frequently-recalled memories stay sticky.
[memory.l3]
vector_dim = 1024
embedder = "bge-m3"
batch_size = 8
flush_interval_s = 2
decay_lambda = 0.02
salience_boost_on_recall = 0.05

# P4-S3: Reciprocal Rank Fusion weights for hybrid recall. Sum is not
# required to be 1.0 — RRF fuses via rank, not raw score, so these
# behave as relative importance knobs across the four signals.
[memory.rrf]
vec_weight = 0.5
fts_weight = 0.3
recency_weight = 0.15
salience_weight = 0.05

# P4-S6 + P4-S7: DeskPet agent loop knobs. `max_iterations` caps the
# ReAct while-loop; `context_window_tokens` feeds the ContextAssembler
# budget allocator. `interrupt_enabled` hooks ASR hot-words ("等一下/停")
# to cancel an in-flight turn; `tts_pre_narration` triggers the TTS
# pre-utterance on the first stream chunk (design.md D2 / task 12.14).
[agent]
max_iterations = 20
context_window_tokens = 200000
interrupt_enabled = true
tts_pre_narration = true

# P4-S7: ContextAssembler v1 (see openspec/changes/p4-poseidon-agent-harness
# /specs/context-assembler/spec.md). Runs once before every agent loop:
# classifies task_type → fans out components in parallel → budget-allocates
# → emits a cache-friendly ContextBundle. Flip `enabled=false` for the
# emergency rollback path (legacy full-registry + prefetch-all mode).
[context.assembler]
enabled = true
policy_file = "deskpet/agent/assembler/policies/default.yaml"
# User override lives under roaming AppData so it survives re-installs
# and doesn't get overwritten by shipped defaults.
user_overrides = "%APPDATA%/deskpet/policies/overrides.yaml"
# BudgetAllocator cap = context_window_tokens * budget_ratio.
budget_ratio = 0.6
# TaskClassifier cascade: rule (<2ms) → embed (~15ms) → llm (≤300ms).
classifier_mode = "rule+embed+llm"
# ~100 hand-labelled exemplars for the embed tier (BGE-M3 cosine).
classifier_exemplars = "deskpet/agent/assembler/policies/exemplars.jsonl"
# D8 decision: haiku-class model for the LLM tier fallback.
llm_classifier_model = "claude-haiku-4-5"
# Unknown task_type (LLM hallucinates a label outside the enum) ⇒ chat.
fallback_task_type = "chat"
# Per-turn decisions trace for the Context Trace UI (P4-S11).
trace_enabled = true

# P4-S5: zero-cost web toolset (web_fetch / web_crawl /
# web_extract_article / web_read_sitemap). No paid search APIs — all four
# tools lean on httpx + trafilatura + selectolax (D5 decision).
[tools.web]
user_agent = "DeskPet/0.6 (+https://github.com/DennyWanye/deskpet)"
respect_robots_txt = true
# BFS crawl rate-limit knobs (per domain, not global).
per_domain_max_concurrency = 2
request_interval_ms = 500
crawl_default_max_pages = 20
crawl_default_max_depth = 2
# `preferred_sources` is injected into the agent system prompt via
# PersonaComponent / ToolComponent so the LLM knows where to crawl by
# topic. Inline tables keep the list readable on one line each.
preferred_sources = [
    { domain = "stackoverflow.com", topic = "code" },
    { domain = "docs.python.org", topic = "python" },
    { domain = "developer.mozilla.org", topic = "web" },
    { domain = "en.wikipedia.org", topic = "general" },
    { domain = "zh.wikipedia.org", topic = "general-zh" },
    { domain = "github.com", topic = "code" },
]

# P4-S9: MCP (Model Context Protocol) client config. Each [[mcp.servers]]
# entry is spawned / connected at startup when `enabled=true`. Tools are
# namespaced `mcp_{server}_{tool}` when injected into the ToolRegistry.
[mcp]
enabled = true

[[mcp.servers]]
name = "filesystem"
command = "npx"
# Filesystem server is scoped to the workspace dir only — NOT the full
# profile, so agents cannot touch arbitrary user files.
args = ["@modelcontextprotocol/server-filesystem", "%APPDATA%/deskpet/workspace"]
transport = "stdio"
enabled = true

[[mcp.servers]]
name = "weather"
# Weather wrapper (open-meteo-based) ships in P4-S9; command/args left as
# placeholders here so the schema is present — config validation in
# task 14.2 only tries to spawn servers with `enabled=true`.
command = ""
args = []
transport = "stdio"
enabled = false

# ─────────────────────────────────────────────────────────────────
# P4-S6: multi-provider LLM layer (Anthropic / OpenAI / Gemini).
#
# Spec-compliant namespace (`[llm.providers]` + `[llm.fallback_chain]`)
# per openspec/changes/p4-poseidon-agent-harness/specs/llm-providers/spec.md.
# The agent_loop / registry MUST read from here. The legacy `[llm_p4.*]`
# namespace below is kept temporarily because the S6 adapter currently
# reads that — follow-up task S12.pre-ship migrates S6 adapter code to
# the spec-compliant namespace and removes [llm_p4.*].
#
# API keys are resolved via env / keyring (see backend/llm/keys.py).
# MUST NOT be written into this file — commits would leak them.
# ─────────────────────────────────────────────────────────────────
# P4-S6: provider selection + global knobs shared by every adapter.
# `main_model` is the default chat model; `classifier_model` is used by
# the ContextAssembler LLM tier. `daily_usd_cap` is the hard budget cap
# enforced by billing layer (80% warning IPC, 100% block).
[llm.providers]
main_model = "claude-sonnet-4-5"
classifier_model = "claude-haiku-4-5"
daily_usd_cap = 10.0
streaming_enabled = true

# P4-S6: fallback chain tried in order on adapter failure. Each entry is
# `<provider>:<model>`. Max 2 retries across providers (task 10.6).
[llm.fallback_chain]
chain = [
    "anthropic:claude-sonnet-4-5",
    "openai:gpt-4o",
    "gemini:gemini-1.5-pro",
]

# ─── legacy [llm_p4.*] namespace (kept until S12 pre-ship migration) ───
# S6's backend/llm/registry.py currently reads these keys verbatim. When
# it's refactored to read [llm.providers]/[llm.fallback_chain] above, this
# block can be deleted. Values MUST mirror [llm.providers]+[llm.fallback_chain].
[llm_p4]
main_model = "anthropic:claude-sonnet-4-5"
classifier_model = "anthropic:claude-haiku-4-5"
daily_usd_cap = 10.0
fallback_chain = [
    "anthropic:claude-sonnet-4-5",
    "openai:gpt-4o",
    "gemini:gemini-1.5-pro",
]

[llm_p4.providers.anthropic]
default_model = "claude-sonnet-4-5"
timeout = 60.0

[llm_p4.providers.openai]
default_model = "gpt-4o"
timeout = 60.0

[llm_p4.providers.gemini]
default_model = "gemini-1.5-pro"
timeout = 60.0
