schema_version = 1

[backend]
host = "127.0.0.1"
port = 8100
log_level = "INFO"

[llm]
provider = "ollama"
model = "qwen2.5:14b"
base_url = "http://localhost:11434"
temperature = 0.7
max_tokens = 2048

[asr]
provider = "faster-whisper"
model = "large-v3-turbo"
device = "cuda"
compute_type = "float16"

[tts]
provider = "cosyvoice2"
model_dir = "./assets/cosyvoice2"

[memory]
db_path = "./data/memory.db"
embedding_model = "bge-m3"
