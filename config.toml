schema_version = 1

[backend]
host = "127.0.0.1"
port = 8100
log_level = "INFO"

[llm]
strategy = "local_first"
daily_budget_cny = 10.0

[llm.local]
model = "gemma4:e4b"
base_url = "http://localhost:11434/v1"
api_key = "ollama"
temperature = 0.7
max_tokens = 2048

# [llm.cloud]
# model = "qwen3.6-plus"
# base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
# api_key = ""  # TODO(P2-1-S3): move to Windows Credential Manager
# temperature = 0.7
# max_tokens = 2048

[asr]
provider = "faster-whisper"
model = "large-v3-turbo"
device = "cuda"
compute_type = "float16"

[tts]
provider = "edge-tts"
voice = "zh-CN-XiaoyiNeural"
model_dir = "./assets/cosyvoice2"  # kept for future CosyVoice 2 upgrade

[vad]
threshold = 0.5
min_speech_ms = 250
min_silence_ms = 500

[memory]
db_path = "./data/memory.db"
embedding_model = "bge-m3"
