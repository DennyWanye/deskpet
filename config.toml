schema_version = 1

[backend]
host = "127.0.0.1"
port = 8100
log_level = "INFO"

[llm]
provider = "ollama"
model = "gemma4:e4b"
base_url = "http://localhost:11434"
temperature = 0.7
max_tokens = 2048

[asr]
provider = "faster-whisper"
model = "large-v3-turbo"
device = "cuda"
compute_type = "float16"

[tts]
provider = "edge-tts"
voice = "zh-CN-XiaoyiNeural"
model_dir = "./assets/cosyvoice2"  # kept for future CosyVoice 2 upgrade

[vad]
threshold = 0.5
min_speech_ms = 250
min_silence_ms = 500

[memory]
db_path = "./data/memory.db"
embedding_model = "bge-m3"
