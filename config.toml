schema_version = 1

[backend]
host = "127.0.0.1"
port = 8100
log_level = "INFO"

[llm]
strategy = "cloud_first"
daily_budget_cny = 10.0

[llm.local]
model = "gemma4:e4b"
base_url = "http://localhost:11434/v1"
api_key = "ollama"
temperature = 0.7
max_tokens = 2048

# Cloud provider. api_key is NOT stored in this file — backend loads it
# from the DESKPET_CLOUD_API_KEY env var at boot. Leaving the section
# enabled means cloud_first can route; comment it out to run local-only.
[llm.cloud]
model = "qwen3.6-plus"
base_url = "https://vcrppsmofoyv.cloud.sealos.io/v1"
temperature = 0.7
max_tokens = 2048

[billing]
# Daily spend cap (CNY). HybridRouter refuses cloud calls once exceeded;
# local calls stay free and unaffected.
daily_budget_cny = 10.0
# Fallback price for models not in [billing.pricing] (CNY per 1M tokens,
# prompt+completion combined). Intentionally pessimistic so unknown models
# don't silently burn budget.
unknown_model_price_cny_per_m_tokens = 20.0
# IANA timezone name used for daily rollover. Defaults to Asia/Shanghai
# (product targets Chinese users — UTC rollover would reset the budget
# at 08:00 Beijing, right in the active-user window). Override if you're
# running the pet outside China, e.g. tz = "America/Los_Angeles".
tz = "Asia/Shanghai"

[billing.pricing]
# Per-1M-token price (CNY). Cover the models listed in [llm.cloud]; unknown
# models fall back to `unknown_model_price_cny_per_m_tokens` above.
"qwen3.6-plus" = 8.0
"deepseek-chat" = 1.0

[asr]
provider = "faster-whisper"
model = "large-v3-turbo"
# P3-S1: subfolder under paths.model_root() containing the bundled
# faster-whisper checkpoints. In dev mode resolves to backend/models/<this>;
# under PyInstaller it resolves to <_MEIPASS>/models/<this>.
model_dir = "faster-whisper-large-v3-turbo"
device = "cuda"
compute_type = "float16"
# P2-2-F1: 热词偏置 —— 对这些常用短语的 logit 加权，减轻短音频
# (< 3s) 上的拼音近似幻觉（典型：讲个笑话 → 一个消化）。
# 空列表 = 不加偏置（与旧行为一致）。配合 transcribe() 里的
# 300ms 静音 pad 使用。
hotwords = [
    # 2026-04-22 修订：hotwords 必须是"短消歧词"（生僻字/专名/高混淆短词），
    # 不能塞整句。之前把"请给我讲一个笑话"整句塞进来，导致 Whisper 在弱/短
    # 音频上直接把 hotwords 当 transcript 吐出来（decoder 的 prefix bias
    # 在 no-speech 边界会回退到 prompt tokens 本身）。
    # 规则：每条 ≤4 字、只含真正易混淆的字词。
    "笑话",
    "散文",
    "故事",
    "你好",
    "谢谢",
    "再见",
]

[tts]
provider = "edge-tts"
voice = "zh-CN-XiaoyiNeural"
model_dir = "cosyvoice2"  # P3-S1: subfolder under paths.model_root() (backend/models/ in dev, sys._MEIPASS/models/ frozen)

[vad]
threshold = 0.5
min_speech_ms = 250
# P2-2 hot-fix (2026-04-20): 回归到 500ms —— Whisper 侧删 initial_prompt
# + no_speech_threshold=0.4 之后，短片段不再会幻觉成"谢谢大家"，可以
# 换更低的句末感知延迟（800ms 等近 1 秒才反应，太拖）。
min_silence_ms = 500

[voice]
# P2-2-M3: TTS-phase barge-in overrides. Normal VAD threshold / min_speech_ms
# live in [vad] above — these apply only while TTS is actively playing, so
# speaker echo is less likely to retrigger speech_start.
vad_threshold_during_tts = 0.65
min_speech_ms_during_tts = 400
# After TTS ends, ignore speech_start for this many ms — covers the tail
# of the audio being played out the speakers.
tts_cooldown_ms = 300

[memory]
# P3-S7: leave db_path empty to use the OS-standard user data directory
# (%AppData%\deskpet\data\memory.db on Windows). Set an absolute path
# here to override; relative paths are anchored under %AppData%\deskpet\.
db_path = ""
embedding_model = "bge-m3"

# ─────────────────────────────────────────────────────────────────
# P4-S6: multi-provider LLM layer (Anthropic / OpenAI / Gemini).
#
# The [llm] / [llm.local] / [llm.cloud] sections above are the P3
# HybridRouter namespace (OpenAI-compatible Ollama + Qwen). The P4
# sections below live under [llm_p4.*] (separate top-level namespace)
# so the P3 config loader doesn't trip on unknown sub-tables.
# When the P4 agent loop runs, it reads ONLY the sections below; the
# P3 HybridRouter continues to own the [llm.local]/[llm.cloud] keys.
#
# API keys are resolved via env / keyring (see backend/llm/keys.py).
# MUST NOT be written into this file — commits would leak them.
# ─────────────────────────────────────────────────────────────────
[llm_p4]
# Default model for the main agent turn.
main_model = "anthropic:claude-sonnet-4-5"
# Classifier model (P4-S7 TaskClassifier LLM layer).
classifier_model = "anthropic:claude-haiku-4-5"
# Daily cap across ALL providers. Reaches 80% → warning IPC event,
# 100% → all subsequent chat_with_fallback calls raise LLMBudgetExceededError.
daily_usd_cap = 10.0
# Fallback chain — primary first, then up to 2 backups (spec: depth MUST ≤ primary + 2).
fallback_chain = [
    "anthropic:claude-sonnet-4-5",
    "openai:gpt-4o",
    "gemini:gemini-1.5-pro",
]

[llm_p4.providers.anthropic]
default_model = "claude-sonnet-4-5"
timeout = 60.0

[llm_p4.providers.openai]
default_model = "gpt-4o"
timeout = 60.0

[llm_p4.providers.gemini]
default_model = "gemini-1.5-pro"
timeout = 60.0

[agent]
# P4-S6: agent loop guards.
# ReAct-loop iteration ceiling — if the LLM keeps asking for tools without
# ever emitting stop_reason=end_turn, the loop aborts after this many turns
# and emits an error event. 20 is enough for any realistic workflow.
max_iterations = 20
